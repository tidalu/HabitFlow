name: Database Migration Check

on:
  pull_request:
    paths:
      - 'prisma/**'

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --shadow-database-url $DATABASE_URL --exit-code
